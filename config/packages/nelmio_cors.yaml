nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['*'] # Autorise toutes les origines
        allow_headers: ['*'] # Autorise tous les headers (Authorization, Content-Type, etc.)
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        expose_headers: []
        max_age: 3600
    paths:
        '^/api/': # S'applique à toutes les routes qui commencent par /api/
            allow_origin: ['*']
            allow_headers: ['*']
            allow_methods: ['POST', 'PUT', 'GET', 'DELETE', 'OPTIONS', 'PATCH']
            max_age: 3600